name: Build VoxFlow Windows Installer

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    name: Windows x64 installer
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: voxflow/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy

      - name: Verify release version consistency
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            python script/check_versions.py --tag $env:GITHUB_REF_NAME
          } else {
            python script/check_versions.py
          }

      - name: Install frontend dependencies
        working-directory: voxflow
        run: npm ci

      - name: Frontend unit tests
        working-directory: voxflow
        run: npm test

      - name: Frontend build
        working-directory: voxflow
        run: npm run build

      - name: NPM high-severity audit
        working-directory: voxflow
        run: npm audit --audit-level=high

      # Tauri validates bundle globs even during clippy/test. Fetch and verify
      # every production runtime before the first Rust build command.
      - name: Fetch verified Windows runtime resources
        shell: pwsh
        run: ./script/fetch_windows_runtime.ps1

      - name: Rust format check
        working-directory: voxflow
        run: cargo fmt --manifest-path src-tauri\Cargo.toml --all -- --check

      - name: Rust clippy
        working-directory: voxflow
        run: cargo clippy --locked --manifest-path src-tauri\Cargo.toml --all-targets -- -D warnings

      - name: Rust unit tests
        working-directory: voxflow
        run: cargo test --locked --manifest-path src-tauri\Cargo.toml --lib

      - name: Build Tauri app (Inno packages it separately)
        working-directory: voxflow
        run: npx tauri build --no-bundle

      - name: Verify packaged Windows prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $requiredFiles = @(
            "voxflow/src-tauri/target/release/voxflow.exe",
            "voxflow/src-tauri/target/release/resources/whisper/Release/whisper-cli.exe",
            "voxflow/src-tauri/target/release/resources/whisper/Release/whisper-server.exe",
            "voxflow/src-tauri/target/release/resources/whisper-cuda/Release/whisper-cli.exe",
            "voxflow/src-tauri/target/release/resources/whisper-cuda/Release/whisper-server.exe",
            "voxflow/src-tauri/resources/vad/silero_vad.onnx"
          )
          foreach ($path in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item $path).Length -eq 0) {
              throw "Required Windows package file is missing or empty: $path"
            }
          }

          $requiredVcRuntime = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "vcomp140.dll"
          )
          $vcDestinations = @(
            "voxflow/src-tauri/resources/windows-redist",
            "voxflow/src-tauri/target/release/resources/whisper/Release",
            "voxflow/src-tauri/target/release/resources/whisper-cuda/Release"
          )
          foreach ($destination in $vcDestinations) {
            foreach ($file in $requiredVcRuntime) {
              $path = Join-Path $destination $file
              if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item $path).Length -eq 0) {
                throw "App-local VC CRT/OpenMP file is missing or empty: $path"
              }
            }
          }

          $bootstrapper = "voxflow/src-tauri/resources/windows-prerequisites/MicrosoftEdgeWebview2Setup.exe"
          if (-not (Test-Path -LiteralPath $bootstrapper -PathType Leaf) -or (Get-Item $bootstrapper).Length -eq 0) {
            throw "WebView2 bootstrapper is missing or empty: $bootstrapper"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $bootstrapper
          $subject = if ($signature.SignerCertificate) { $signature.SignerCertificate.Subject } else { "" }
          $product = (Get-Item -LiteralPath $bootstrapper).VersionInfo.ProductName
          if ($signature.Status -ne "Valid" -or $subject -notmatch "(^|,\s*)O=Microsoft Corporation(,|$)") {
            throw "WebView2 bootstrapper signature is not valid Microsoft Authenticode: status=$($signature.Status), signer=$subject"
          }
          if ([string]::IsNullOrWhiteSpace($product) -or $product -notmatch "WebView2|^Microsoft Edge Update$") {
            throw "Unexpected WebView2 bootstrapper product metadata: $product"
          }

      - name: Install pinned Inno Setup
        run: choco install innosetup --version=6.7.1 --yes --no-progress

      - name: Compile Inno Setup installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\VoxFlow.iss'

      - name: Verify installer name and write checksum
        shell: pwsh
        run: |
          $version = (Get-Content voxflow/package.json | ConvertFrom-Json).version
          $installer = Get-Item "installer/Output/VoxFlow-Setup-$version.exe"
          if ($installer.Length -eq 0) {
            throw "Installer is empty: $($installer.FullName)"
          }
          $digest = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          $checksumPath = "installer/Output/SHA256SUMS-windows.txt"
          # Write a portable LF-only checksum file. Set-Content on Windows emits
          # CRLF, which makes GNU sha256sum treat the trailing CR as part of the
          # filename when the cross-platform release orchestrator verifies it.
          [IO.File]::WriteAllText(
            $checksumPath,
            "$digest  $($installer.Name)`n",
            [Text.UTF8Encoding]::new($false)
          )
          if ([IO.File]::ReadAllBytes($checksumPath) -contains 13) {
            throw "Windows checksum file contains a carriage return"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: VoxFlow-Windows-x64
          path: |
            installer/Output/VoxFlow-Setup-*.exe
            installer/Output/SHA256SUMS-windows.txt
          if-no-files-found: error
          retention-days: 14
