name: Release macOS ARM64 (ad-hoc)

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-macos-arm64.yml"
      - "script/build_macos_arm64_release.sh"
      - "script/check_versions.py"
      - "script/patches/whisper.cpp-v1.8.6-macos11.patch"
      - "voxflow/package.json"
      - "voxflow/package-lock.json"
      - "voxflow/src/**"
      - "voxflow/src-tauri/**"

permissions:
  contents: read

concurrency:
  group: macos-arm64-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS 15 ARM64 / complete ad-hoc seal
    runs-on: macos-15
    timeout-minutes: 90
    env:
      CI: "true"
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      VOXFLOW_XCODE_BUILD: "16F6"
      VOXFLOW_XCODE_VERSION: "16.4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: voxflow/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13.5"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.1"
          targets: aarch64-apple-darwin
          components: rustfmt, clippy

      - name: Verify native ARM64 runner and pinned Xcode
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]]
          [[ -x "$DEVELOPER_DIR/usr/bin/xcodebuild" ]]
          [[ "$(xcodebuild -version | awk 'NR == 1 {print $2}')" == "$VOXFLOW_XCODE_VERSION" ]]
          [[ "$(xcodebuild -version | awk 'NR == 2 {print $3}')" == "$VOXFLOW_XCODE_BUILD" ]]
          rustc --version --verbose
          node --version
          python3 --version

      - name: Build, test, package, and verify ad-hoc release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            ./script/build_macos_arm64_release.sh --tag "$GITHUB_REF_NAME"
          else
            ./script/build_macos_arm64_release.sh
          fi

      - name: Upload app, DMG, manifest, and SHA256 checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: VoxFlow-macOS-arm64-adhoc-${{ github.sha }}
          path: voxflow/release/macos/*/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
