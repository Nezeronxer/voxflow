name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Version metadata
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Verify package, Cargo, Tauri, and Inno versions
        run: python script/check_versions.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: voxflow/package-lock.json

      - name: Install dependencies from lockfile
        working-directory: voxflow
        run: npm ci

      - name: Frontend unit tests
        working-directory: voxflow
        run: npm test

      - name: Type-check and build
        working-directory: voxflow
        run: npm run build

      - name: NPM high-severity audit
        working-directory: voxflow
        run: npm audit --audit-level=high

  rust:
    name: Rust / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2025
          - label: macOS ARM64
            os: macos-15
    runs-on: ${{ matrix.os }}
    # Bundle assets are irrelevant for compile/lint/unit checks. Tauri otherwise
    # validates ignored resource globs during build.rs; release CI uses real,
    # checksum-verified resources instead.
    env:
      TAURI_CONFIG: '{"bundle":{"resources":[]}}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy

      - name: Report runner and compiler architecture
        run: rustc --version --verbose

      - name: Rust format check
        working-directory: voxflow
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust clippy
        working-directory: voxflow
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust unit tests
        working-directory: voxflow
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --lib
