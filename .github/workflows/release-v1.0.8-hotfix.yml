          $compressed = [System.Convert]::FromBase64String(($patchGzipB64 -replace "\s", ""))
          $inputStream = [System.IO.MemoryStream]::new($compressed)
          $gzipStream = [System.IO.Compression.GZipStream]::new($inputStream, [System.IO.Compression.CompressionMode]::Decompress)
          $outputStream = [System.IO.MemoryStream]::new()
          $gzipStream.CopyTo($outputStream)
          $gzipStream.Dispose()
          $inputStream.Dispose()
          $patch = [System.Text.Encoding]::UTF8.GetString($outputStream.ToArray())
          $outputStream.Dispose()
          $patchPath = Join-Path $env:RUNNER_TEMP "voxflow-v1.0.8-source-only.patch"
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($patchPath, $patch, $utf8NoBom)
          git apply --whitespace=nowarn $patchPath
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md RELEASE_NOTES.md installer/VoxFlow.iss voxflow/package-lock.json voxflow/package.json voxflow/src-tauri/Cargo.lock voxflow/src-tauri/Cargo.toml voxflow/src-tauri/src/engine.rs voxflow/src-tauri/src/models.rs voxflow/src-tauri/tauri.conf.json
          git status --short
          git commit -m "Release VoxFlow v1.0.8 Windows reliability"
          git push origin HEAD:codex/windows-10-dictation-reliability

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        working-directory: voxflow
        run: npm ci

      - name: Frontend build
        working-directory: voxflow
        run: npm run build

      - name: NPM high-severity audit
        working-directory: voxflow
        run: npm audit --audit-level=high

      - name: Fetch bundled runtime resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $runtimeRoot = "voxflow/src-tauri/resources"
          $cpuDest = Join-Path $runtimeRoot "whisper/Release"
          $cudaDest = Join-Path $runtimeRoot "whisper-cuda/Release"
          $vadDest = Join-Path $runtimeRoot "vad"
          New-Item -ItemType Directory -Force -Path $cpuDest, $cudaDest, $vadDest | Out-Null

          $tmp = Join-Path $env:RUNNER_TEMP "voxflow-runtime"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          $releaseBase = "https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.6"

          $cpuZip = Join-Path $tmp "whisper-bin-x64.zip"
          $cudaZip = Join-Path $tmp "whisper-cublas-12.4.0-bin-x64.zip"
          curl.exe -L --fail --retry 3 --output $cpuZip "$releaseBase/whisper-bin-x64.zip"
          curl.exe -L --fail --retry 3 --output $cudaZip "$releaseBase/whisper-cublas-12.4.0-bin-x64.zip"

          $cpuExtract = Join-Path $tmp "cpu"
          $cudaExtract = Join-Path $tmp "cuda"
          Expand-Archive -Path $cpuZip -DestinationPath $cpuExtract -Force
          Expand-Archive -Path $cudaZip -DestinationPath $cudaExtract -Force

          $cpuFiles = @(
            "ggml.dll",
            "ggml-base.dll",
            "ggml-cpu.dll",
            "whisper.dll",
            "whisper-cli.exe",
            "whisper-server.exe"
          )
          foreach ($file in $cpuFiles) {
            Copy-Item -Force (Join-Path $cpuExtract "Release/$file") (Join-Path $cpuDest $file)
          }

          $cudaFiles = @(
            "cublas64_12.dll",
            "cublasLt64_12.dll",
            "cudart64_12.dll",
            "ggml.dll",
            "ggml-base.dll",
            "ggml-cpu.dll",
            "ggml-cuda.dll",
            "nvrtc-builtins64_124.dll",
            "nvrtc64_120_0.dll",
            "whisper.dll",
            "whisper-cli.exe",
            "whisper-server.exe"
          )
          foreach ($file in $cudaFiles) {
            Copy-Item -Force (Join-Path $cudaExtract "Release/$file") (Join-Path $cudaDest $file)
          }

          $vadModel = Join-Path $vadDest "silero_vad.onnx"
          curl.exe -L --fail --retry 3 --output $vadModel "https://raw.githubusercontent.com/snakers4/silero-vad/master/src/silero_vad/data/silero_vad.onnx"

      - name: Rust format check
        working-directory: voxflow
        run: cargo fmt --manifest-path src-tauri\Cargo.toml --all -- --check

      - name: Rust clippy
        working-directory: voxflow
        run: cargo clippy --manifest-path src-tauri\Cargo.toml --all-targets -- -D warnings

      - name: Rust unit tests
        working-directory: voxflow
        run: cargo test --manifest-path src-tauri\Cargo.toml --lib

      - name: Verify bundled runtime resources
        shell: pwsh
        run: |
          $required = @(
            "voxflow/src-tauri/resources/whisper/Release/whisper-cli.exe",
            "voxflow/src-tauri/resources/whisper/Release/whisper-server.exe",
            "voxflow/src-tauri/resources/vad/silero_vad.onnx"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            $missing | ForEach-Object { Write-Error "Missing bundled runtime resource: $_" }
            throw "Bundled runtime resources are required before building the installer."
          }

      - name: Build Tauri app (no bundle)
        working-directory: voxflow
        run: npx tauri build --no-bundle

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Inno Setup installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\VoxFlow.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxFlow-Setup
          path: installer\Output\*.exe

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "v1.0.8"
          $target = (git rev-parse HEAD).Trim()
          $installer = Get-ChildItem installer\Output\VoxFlow-Setup-*.exe | Select-Object -First 1
          if (-not $installer) {
            throw "Installer artifact was not produced."
          }

          $releaseExists = $false
          try {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) { $releaseExists = $true }
          } catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release edit $tag --title "VoxFlow $tag" --notes-file RELEASE_NOTES.md
            gh release upload $tag $installer.FullName --clobber
          } else {
            gh release create $tag $installer.FullName --target $target --title "VoxFlow $tag" --notes-file RELEASE_NOTES.md
          }
