name: Release VoxFlow v1.0.8 Hotfix

on:
  push:
    branches:
      - 'codex/windows-10-dictation-reliability'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply v1.0.8 clippy patch and publish commit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $patchGzipB64 = @'
          H4sICElhTWoAA3ZveGZsb3ctdjEwOC1jbGlwcHkucGF0Y2gApZXNbuM2EMfvfoppDgFV27Tk2I6j
          fHSLvRXYDZAAvRSFQEmjrNaSKJC0nXSdAj330EfoK/TQFi3a7TM4b9ShJMtumjoBKsCmSM0MyZkf
          /4zTJIF+/yY1IAYLeZtkcjnQKuobMVepfRuIeZxKrjSEzxh00iLGW5gkiRi7x5yPj3CYjCfgue5k
          NOr0+/1n5+h0u93n53n1Cvqj8bR3DN26oYFyHkJSgFFpHug0wyJCpkVeZqh9OPwqORp+3QMlDPow
          Pxo60L+ALzE6o/EL+NAB+9yfdqB+Gwxg/eP6r/UfDz/At97YhfWfD9/xTt9+y9BALtRNWsA5MBsR
          hIa5Tr9B+BSs8cDu2HV4Lm6Z65x2uv9y+2+vdgnWXhuhjJ0lSZU2ZJcokaPDtTBzCpEWN4Geh6wO
          SxO1jljE1o1lgty64DkbX+o01jxPi02COKWLORQgfp4GLMgb9+HQWjQ8uN7Yox/n0ZE3nUbHL+Fh
          G2MfEFsrS8Rw6p5YJJqWhogHEYvSpAsMSiXz0rA4JBo+V9HZm7nB27PXsigwMqksLi4qJi5L2zm7
          Jo6Km5aMNIEFT3WAFOKOOZth+yikWhTwVhbYFOC+5mTBtVQmCO/YSvQgXEHIPR7lJTsU3HM2WLRW
          wQzJMjWYr6juse+Tqe9f4QKVRmbHa6+2xkaWfoXwZq3ndo2FkQEZK+ZwI2bIRhWHJVuxZQ8CZwVL
          h0cyy2jTbBPtWubIKBx/L4mJAzhwnA7t4gUwlFIbSmyEWu8j4p9mG5k4GY6H3pRzb+KGJ5PRS7B4
          FGgfG49MK8mYeD3PJc2gtuWjLLO7QGOWBJFUqmZBBxlxxewf0aKNqtCo8/xE7a0dp7zryqBN6z0d
          5VoxpCzJrb9xs9Wrcs6qA96jgcJxqH4JZSawZ/bxggI6tDMq6qGRM+0AZhp3A9onVChmp9ux+waw
          5TsSw/8/5c6u6TA0wnQOLqxWTa9rY8LFOViHWlF2vXbW2PZfxJjCpSKi9/G1NWnYwng0jVySnKE3
          mURHL7qCdoLs42rHzDJF8a3m1M32GpIlFkqSxKggUYhBLmMqGrNXUVRdQr5GYwVc+/5181ZBdoV6
          npkze67fWJ/teVeoS0KTiLyk4FdV8MpEXzVfqJwaVYzBey0L309I8YKFyObIFs426VYOAlSKrXAF
          orh7J5efsINtTKjX6sP64/oXugN/Xf+2/nn9E/U+Pny//h2+uL5868MHvCeZ+GxHj/K5AQpgmWp3
          HMhKTjXbLJ7HwginwZSsH2uk4JkIMbOniVKPKhIkfk4tm+GT31ol3Ym2q6WVcj7p2Kz9csbItVI8
          6PwNGsyG+A8JAAA=
          '@
          $gzipPath = Join-Path $env:RUNNER_TEMP "voxflow-v108-clippy.patch.gz"
          $patchPath = Join-Path $env:RUNNER_TEMP "voxflow-v108-clippy.patch"
          [IO.File]::WriteAllBytes($gzipPath, [Convert]::FromBase64String(($patchGzipB64 -replace '\s', '')))
          $source = [IO.File]::OpenRead($gzipPath)
          try {
            $gzip = [IO.Compression.GzipStream]::new($source, [IO.Compression.CompressionMode]::Decompress)
            try {
              $target = [IO.File]::Create($patchPath)
              try {
                $gzip.CopyTo($target)
              } finally {
                $target.Dispose()
              }
            } finally {
              $gzip.Dispose()
            }
          } finally {
            $source.Dispose()
          }

          git apply --check $patchPath
          git apply $patchPath
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add voxflow/src-tauri/src/audio.rs voxflow/src-tauri/src/engine.rs voxflow/src-tauri/src/postprocess.rs voxflow/src-tauri/src/rewrite.rs
          git commit -m "Fix VoxFlow v1.0.8 clippy warnings"
          git push origin HEAD:codex/windows-10-dictation-reliability

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        working-directory: voxflow
        run: npm ci

      - name: Frontend build
        working-directory: voxflow
        run: npm run build

      - name: NPM high-severity audit
        working-directory: voxflow
        run: npm audit --audit-level=high

      - name: Fetch bundled runtime resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $runtimeRoot = "voxflow/src-tauri/resources"
          $cpuDest = Join-Path $runtimeRoot "whisper/Release"
          $cudaDest = Join-Path $runtimeRoot "whisper-cuda/Release"
          $vadDest = Join-Path $runtimeRoot "vad"
          New-Item -ItemType Directory -Force -Path $cpuDest, $cudaDest, $vadDest | Out-Null

          $tmp = Join-Path $env:RUNNER_TEMP "voxflow-runtime"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          $releaseBase = "https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.6"

          $cpuZip = Join-Path $tmp "whisper-bin-x64.zip"
          $cudaZip = Join-Path $tmp "whisper-cublas-12.4.0-bin-x64.zip"
          curl.exe -L --fail --retry 3 --output $cpuZip "$releaseBase/whisper-bin-x64.zip"
          curl.exe -L --fail --retry 3 --output $cudaZip "$releaseBase/whisper-cublas-12.4.0-bin-x64.zip"

          $cpuExtract = Join-Path $tmp "cpu"
          $cudaExtract = Join-Path $tmp "cuda"
          Expand-Archive -Path $cpuZip -DestinationPath $cpuExtract -Force
          Expand-Archive -Path $cudaZip -DestinationPath $cudaExtract -Force

          $cpuFiles = @(
            "ggml.dll",
            "ggml-base.dll",
            "ggml-cpu.dll",
            "whisper.dll",
            "whisper-cli.exe",
            "whisper-server.exe"
          )
          foreach ($file in $cpuFiles) {
            Copy-Item -Force (Join-Path $cpuExtract "Release/$file") (Join-Path $cpuDest $file)
          }

          $cudaFiles = @(
            "cublas64_12.dll",
            "cublasLt64_12.dll",
            "cudart64_12.dll",
            "ggml.dll",
            "ggml-base.dll",
            "ggml-cpu.dll",
            "ggml-cuda.dll",
            "nvrtc-builtins64_124.dll",
            "nvrtc64_120_0.dll",
            "whisper.dll",
            "whisper-cli.exe",
            "whisper-server.exe"
          )
          foreach ($file in $cudaFiles) {
            Copy-Item -Force (Join-Path $cudaExtract "Release/$file") (Join-Path $cudaDest $file)
          }

          $vadModel = Join-Path $vadDest "silero_vad.onnx"
          curl.exe -L --fail --retry 3 --output $vadModel "https://raw.githubusercontent.com/snakers4/silero-vad/master/src/silero_vad/data/silero_vad.onnx"

      - name: Rust format check
        working-directory: voxflow
        run: cargo fmt --manifest-path src-tauri\Cargo.toml --all -- --check

      - name: Rust clippy
        working-directory: voxflow
        run: cargo clippy --manifest-path src-tauri\Cargo.toml --all-targets -- -D warnings

      - name: Rust unit tests
        working-directory: voxflow
        run: cargo test --manifest-path src-tauri\Cargo.toml --lib

      - name: Verify bundled runtime resources
        shell: pwsh
        run: |
          $required = @(
            "voxflow/src-tauri/resources/whisper/Release/whisper-cli.exe",
            "voxflow/src-tauri/resources/whisper/Release/whisper-server.exe",
            "voxflow/src-tauri/resources/vad/silero_vad.onnx"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            $missing | ForEach-Object { Write-Error "Missing bundled runtime resource: $_" }
            throw "Bundled runtime resources are required before building the installer."
          }

      - name: Build Tauri app (no bundle)
        working-directory: voxflow
        run: npx tauri build --no-bundle

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Inno Setup installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\VoxFlow.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxFlow-Setup
          path: installer\Output\*.exe

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v1.0.8"
          $installer = Get-ChildItem installer\Output\VoxFlow-Setup-*.exe | Select-Object -First 1
          if (-not $installer) {
            throw "Installer artifact was not produced."
          }
          $releaseTarget = (git rev-parse HEAD).Trim()
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --target $releaseTarget --title "VoxFlow $tag" --notes-file RELEASE_NOTES.md
            gh release upload $tag $installer.FullName --clobber
          } else {
            gh release create $tag $installer.FullName --target $releaseTarget --title "VoxFlow $tag" --notes-file RELEASE_NOTES.md
          }
