<!doctype html><html><head><meta charset="utf-8"><style>
  @font-face{font-family:'Unbounded';font-weight:800;src:url('unbounded-latin-800.woff2') format('woff2')}
  @font-face{font-family:'Plex';font-weight:500;src:url('plex-sans-cyrillic-500.woff2') format('woff2')}
  @font-face{font-family:'Plex';font-weight:600;src:url('plex-sans-cyrillic-600.woff2') format('woff2')}
  @font-face{font-family:'PlexMono';font-weight:500;src:url('plex-mono-cyrillic-500.woff2') format('woff2')}
  html,body{margin:0;padding:0}
  body{width:164px;height:314px;background:#ffffff;overflow:hidden;
       font-family:'Plex',sans-serif;color:#161616;
       display:flex;flex-direction:column;align-items:center}
  .kicker{margin-top:24px;font-family:'PlexMono',monospace;font-weight:500;
          font-size:8px;letter-spacing:3px;color:#8a8f96;text-transform:uppercase}
  .logo{margin-top:22px;width:74px;height:74px}
  .name{margin-top:16px;font-family:'Unbounded',sans-serif;font-weight:800;
        font-size:23px;color:#161616;letter-spacing:-.5px}
  .rule{margin-top:13px;width:38px;height:2px;background:#161616}
  .tag{margin-top:13px;font-family:'Plex',sans-serif;font-weight:500;font-size:11px;
       color:#5a606a;text-align:center;line-height:1.42;padding:0 22px}
  .foot{margin-top:auto;width:100%;background:#161616;color:#ffffff;
        font-family:'PlexMono',monospace;font-weight:500;font-size:8px;
        letter-spacing:2px;text-transform:uppercase;text-align:center;
        box-sizing:border-box;padding:10px 0}
</style></head><body>
  <div class="kicker">Установка</div>
  <img class="logo" src="installer-mono.svg">
  <div class="name">VoxFlow</div>
  <div class="rule"></div>
  <div class="tag">Локальный<br>голосовой ввод</div>
  <div class="foot">Локально · Оффлайн · RU</div>
</body></html>
